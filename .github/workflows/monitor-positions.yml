name: Position Monitor

on:
  repository_dispatch:
    types: [check-positions]   # cron-job.org fires this every 1 min
  workflow_dispatch:

# Only one positions check runs at a time; new trigger cancels the queued one (not in-progress)
concurrency:
  group: position-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  positions:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest state
        run: git pull --rebase --autostash || (git rebase --abort && git pull --ff-only)

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check positions only
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TRADE_MODE:         ${{ secrets.TRADE_MODE }}
          SOLANA_PRIVATE_KEY: ${{ secrets.SOLANA_PRIVATE_KEY }}
        run: python check_positions.py
