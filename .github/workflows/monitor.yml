name: Signal Scout Monitor

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 min fallback if cron-job.org is down
  repository_dispatch:
    types: [run-scan]          # cron-job.org fires this every 10 min (free, no server needed)
  workflow_dispatch:           # manual trigger from GitHub Actions UI

permissions:
  contents: write              # needed to commit paper_trades.json back to repo

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest state
        run: git pull --rebase --autostash || (git rebase --abort && git pull --ff-only)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan and alert
        env:
          TELEGRAM_BOT_TOKEN:      ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:        ${{ secrets.TELEGRAM_CHAT_ID }}
          HELIUS_API_KEY:          ${{ secrets.HELIUS_API_KEY }}
          TRADE_MODE:              ${{ secrets.TRADE_MODE }}
          SOLANA_PRIVATE_KEY:      ${{ secrets.SOLANA_PRIVATE_KEY }}
          MAX_TRADE_SOL:           ${{ secrets.MAX_TRADE_SOL }}
          MAX_DAILY_LOSS_SOL:      ${{ secrets.MAX_DAILY_LOSS_SOL }}
          # X/Twitter alpha caller scanner (twitter_search.py)
          TWITTER_BEARER_TOKEN:    ${{ secrets.TWITTER_BEARER_TOKEN }}
          X_ALPHA_ACCOUNTS:        ${{ secrets.X_ALPHA_ACCOUNTS }}
          # Telegram alpha channel scanner (tg_alpha.py)
          TELEGRAM_API_ID:         ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH:       ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          TG_ALPHA_CHANNELS:       ${{ secrets.TG_ALPHA_CHANNELS }}
        run: python scan_and_alert.py
