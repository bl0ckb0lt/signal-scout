name: Signal Scout Monitor

on:
  schedule:
    - cron: '*/5 * * * *'    # every 5 minutes, 24/7, free on public repos
  workflow_dispatch:           # manual trigger from GitHub Actions UI

permissions:
  contents: write              # needed to commit paper_trades.json back to repo

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run scan and alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          OKX_API_KEY:        ${{ secrets.OKX_API_KEY }}
          OKX_SECRET_KEY:     ${{ secrets.OKX_SECRET_KEY }}
          OKX_PASSPHRASE:     ${{ secrets.OKX_PASSPHRASE }}
        run: python scan_and_alert.py
