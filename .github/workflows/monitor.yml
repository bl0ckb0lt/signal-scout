name: Signal Scout Monitor

on:
  schedule:
    - cron: '*/5 * * * *'    # every 5 minutes (backup — primary trigger is cron-job.org)
  workflow_dispatch:           # manual trigger from GitHub Actions UI

permissions:
  contents: write              # needed to commit paper_trades.json back to repo

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest state
        run: git pull --rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install base58 PyNaCl

      - name: Run scan and alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          HELIUS_API_KEY:     ${{ secrets.HELIUS_API_KEY }}
          TRADE_MODE:         ${{ secrets.TRADE_MODE }}
          SOLANA_PRIVATE_KEY: ${{ secrets.SOLANA_PRIVATE_KEY }}
          MAX_TRADE_SOL:      ${{ secrets.MAX_TRADE_SOL }}
          MAX_DAILY_LOSS_SOL: ${{ secrets.MAX_DAILY_LOSS_SOL }}
        run: python scan_and_alert.py
