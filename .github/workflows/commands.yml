name: Command Handler

on:
  repository_dispatch:
    types: [run-commands]   # cron-job.org fires this every 1 minute

permissions:
  contents: write

jobs:
  commands:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest state
        run: git pull --rebase --autostash || (git rebase --abort && git pull --ff-only)

      - name: Handle commands
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TRADE_MODE:         ${{ secrets.TRADE_MODE }}
          SOLANA_PRIVATE_KEY: ${{ secrets.SOLANA_PRIVATE_KEY }}
          MAX_TRADE_SOL:      ${{ secrets.MAX_TRADE_SOL }}
          MAX_DAILY_LOSS_SOL: ${{ secrets.MAX_DAILY_LOSS_SOL }}
        run: python commands.py
